<script type="text/javascript">
$(document).ready(function(){
  $(".header .an").click(function(){
    $(".nav").slideToggle();
    $(this).toggleClass("n");
  });

  // 初始化语言切换器高亮状态
  function updateLanguageSwitcher() {
    var currentLang = window.language || "zh-CN";
    $(".lang-link").removeClass("active");
    if (currentLang === "zh-CN") {
      $("#langLinkZh").addClass("active");
    } else if (currentLang === "en-US") {
      $("#langLinkEn").addClass("active");
    }
  }

  // 初始更新
  updateLanguageSwitcher();

  // 为语言切换链接添加事件监听器（备用，以防onclick失效）
  $('.lang-link').on('click', function(e) {
    e.preventDefault();
    var langCode = $(this).hasClass('zh-cn') ? 'zh-CN' : 'en-US';
    window.switchLanguage(langCode);
  });

  // 语言切换后更新（如果页面没有重定向）
  window.addEventListener('storage', function(e) {
    if (e.key === 'preferred_lang') {
      window.language = e.newValue;
      updateLanguageSwitcher();
    }
  });
});
function setAuthentication() {
  // 存储当天日期，当天内不再弹出
  var today = new Date().toDateString();
  localStorage.setItem('authentication', JSON.stringify({ date: today }));
  $('#exampleModalCenter').css("display","none");
}

function getAuthentication(){
  var stored = localStorage.getItem('authentication');
  if (!stored) {
    return null;
  }
  try {
    var val = JSON.parse(stored);
    if (!val || !val.date) {
      return null;
    }
    // 比较存储日期与当天日期，不同则过期
    var today = new Date().toDateString();
    if (val.date !== today) {
      localStorage.removeItem('authentication');
      return null;
    }
    return 1;
  } catch(e) {
    localStorage.removeItem('authentication');
    return null;
  }
}

// 在DOM准备好后检查认证状态
$(document).ready(function(){
  if (getAuthentication() !== 1) {
    $('#exampleModalCenter').css("display","block");
  }
});

function declineAuthentication() {
  // 用户选择放弃，必须接受认证才能继续浏览
  // 设置拒绝标志
  localStorage.setItem('authentication_declined', 'true');
  // 显示提示信息
  alert("您必须接受合格投资者认证才能继续浏览本网站。");
  // 重定向到空白页面，阻止继续浏览
  window.location.href = 'about:blank';
}
</script>
